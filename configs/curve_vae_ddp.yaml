# Stage 1/2 (8x A800 DDP) -- train the per-curve neural parametric VAE.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/curve_vae_ddp.yaml
#
# Multi-GPU twin of curve_vae.yaml: identical model, DDP trainer + an LR scaled
# for the larger global batch (data.batch_size * 8). Keep the two files in sync
# when you tweak the architecture.
seed_everything: 3407

model:
  class_path: src.module.CurveVAEModule
  init_args:
    curve_vae:
      latent_channels: 3              # 3 channels x 4 latent positions = 12-d
      sample_points_num: 32           # encoder length; decode can query any length
      down_block_types: ["DownBlock1D", "DownBlock1D", "DownBlock1D"]
      block_out_channels: [128, 256, 256]
      layers_per_block: 2             # transformer layers in encoder/decoder

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 1.0e-4 (global batch is 8x larger under DDP).
    lr: 2.8e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/curve_vae.yaml
  num_nodes: 1
  strategy: ddp                 # curve VAE trains all params -> plain ddp is enough
  sync_batchnorm: false         # no BatchNorm in the curve VAE
  use_distributed_sampler: true # shard the dataset across ranks
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: stage1_curve_vae_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_loss={val/loss:.4f}
        monitor: val/loss
        verbose: false
        save_last: true
        save_top_k: 3
        mode: min
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
