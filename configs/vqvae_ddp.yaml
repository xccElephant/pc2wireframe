# VQVAE WireframeAE (8x A800 DDP) -- single-stage end-to-end joint vertex+edge.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/vqvae_ddp.yaml
#
# Multi-GPU twin of vqvae.yaml: identical model, DDP trainer + an LR scaled for
# the larger global batch (data.batch_size * 8). Keep in sync with vqvae.yaml.
seed_everything: 3407

model:
  class_path: src.module.JointWireframeModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3, multi-scale compressors -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth
      grid_size: 0.01
      freeze: true
      scale_tokens: [192, 128, 96, 64, 32]
      scale_stages: [0, 1, 2, 3, 4]
      latent_dim: 256
      compressor_heads: 6        # must divide every used stage's enc_channels
      compressor_layers: 1

    # ----- per-scale residual vector quantizer -----
    quantizer:
      n_q: 8                     # budget (192+128+96+64+32)*8 = 512*8 = 4096
      codebook_size: [8192, 4096, 2048, 1024, 512]  # shrink coarse scales
      kmeans_init: true
      kmeans_iters: 10
      threshold_ema_dead_code: 4
      decay: 0.95
      commitment_weight: 0.25

    # ----- per-curve VAE (trained jointly; 12-d per-edge latent contract) -----
    curve_vae:
      latent_channels: 3              # 3 channels x 4 latent positions = 12-d
      sample_points_num: 32
      down_block_types: ["DownBlock1D", "DownBlock1D", "DownBlock1D"]
      block_out_channels: [128, 256, 256]
      layers_per_block: 2

    # ----- joint vertex+edge decoder -----
    decoder:
      latent_dim: 256
      num_vertex_queries: 512
      num_edge_queries: 512
      d_model: 256
      nhead: 8
      num_layers: 6
      mlp_ratio: 4.0
      dropout: 0.0
      assoc_dim: 64
      coord_tanh: true

    # ----- loss weights (joint set criterion) -----
    w_vexist: 2.0
    w_vcoord: 5.0
    w_eexist: 2.0
    w_curve: 5.0
    w_curve_endpoint: 2.0
    w_lat_reg: 0.1
    w_anchor: 5.0
    w_anchor_endpoint: 2.0
    w_assoc: 2.0
    assoc_pos_weight_max: 64.0
    w_commit: 0.25
    focal_gamma: 0.0             # 0 -> calibrated BCE; >0 restores focal
    focal_alpha: 0.5
    exist_label_smoothing: 0.02
    exist_pos_weight_max: 20.0
    match_w_vcoord: 1.0
    match_w_exist: 0.5
    match_w_inc: 1.0
    match_w_lat: 1.0

    # ----- schedules -----
    quant_warmup_steps: 2000
    commit_ramp_steps: 2000
    kl_weight: 1.0e-6
    kl_ramp_steps: 2000
    match_warmup_steps: 2000
    match_inc_ramp_steps: 2000

    # ----- decode (validation / predict): threshold the predicted sets -----
    vthr: 0.5
    ethr: 0.5
    min_vertices: 2
    min_edges: 1
    num_per_edge: 32

    # ----- eval metric -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_match_thresh: 0.1

    # ----- threshold-robust checkpoint selection (vthr, ethr grid) -----
    val_vthr_grid: [0.3, 0.4, 0.5, 0.6]
    val_ethr_grid: [0.3, 0.4, 0.5, 0.6, 0.7]

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 3e-4 (global batch is 8x larger under DDP).
    lr: 8.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 1000
    # LR cosine horizon: only a fallback -- the scheduler primarily uses
    # trainer.estimated_stepping_batches (tracks max_epochs/devices). Kept
    # proportional to max_epochs (DDP does ~1/8 the steps/epoch of 1 GPU).
    max_steps: 300000
    grad_clip: 1.0

trainer:
  max_epochs: 300
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/vqvae.yaml
  num_nodes: 1
  # find_unused_parameters: during the continuous-z quant warmup the decoder
  # consumes z (not z_q), so each RVQ's output projection is momentarily unused;
  # the flag lets DDP tolerate that conditional path. The frozen Utonia backbone
  # simply has no grads.
  strategy:
    class_path: pytorch_lightning.strategies.DDPStrategy
    init_args:
      find_unused_parameters: true
  sync_batchnorm: false
  use_distributed_sampler: true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_vqvae_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score_best:.4f}
        monitor: val/score_best
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
