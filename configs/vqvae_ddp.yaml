# VQVAE WireframeAE (8x A800 DDP) -- end-to-end discrete autoencoder.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/vqvae_ddp.yaml
#
# Multi-GPU twin of vqvae.yaml: identical model, DDP trainer + an LR scaled for
# the larger global batch (data.batch_size * 8). Keep in sync with vqvae.yaml.
seed_everything: 3407

model:
  class_path: src.module.WireframeAEModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3, multi-scale compressors -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth
      grid_size: 0.01
      freeze: true
      scale_tokens: [256, 128, 64]
      scale_stages: null
      latent_dim: 256
      compressor_heads: 8
      compressor_layers: 1

    # ----- per-scale residual vector quantizer -----
    quantizer:
      n_q: 8                     # budget (256+128+64)*8 = 3584 <= 4096
      codebook_size: 8192
      kmeans_init: true
      kmeans_iters: 10
      threshold_ema_dead_code: 2
      decay: 0.99
      commitment_weight: 0.25

    # ----- edge-set decoder (512 edge queries: self-attn + cross-attn z_q) -----
    decoder:
      latent_dim: 256
      num_edge_queries: 512
      sample_points_num: 32
      d_model: 256
      nhead: 8
      num_layers: 6
      mlp_ratio: 4.0
      dropout: 0.0
      points_hidden: 256

    # ----- loss weights (edge-set criterion) -----
    w_exist: 1.0
    w_points: 5.0
    w_endpoint: 5.0
    w_smooth: 0.5
    w_seglen: 0.1
    w_commit: 0.25
    focal_gamma: 2.0
    focal_alpha: 0.25
    match_w_geo: 1.0
    match_w_exist: 0.5

    # ----- quantization schedule -----
    quant_warmup_steps: 2000
    commit_ramp_steps: 2000

    # ----- decode (validation / predict): endpoint aggregation -----
    edge_thresh: 0.5
    tau_merge: 0.015
    topk_edges: 0
    num_per_edge: 32

    # ----- eval metric -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 3e-4 (global batch is 8x larger under DDP).
    lr: 8.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 1000
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/vqvae.yaml
  num_nodes: 1
  # find_unused_parameters: during the continuous-z quant warmup the decoder
  # consumes z (not z_q), so each RVQ's output projection is momentarily unused;
  # the flag lets DDP tolerate that conditional path. The frozen Utonia backbone
  # simply has no grads.
  strategy:
    class_path: pytorch_lightning.strategies.DDPStrategy
    init_args:
      find_unused_parameters: true
  sync_batchnorm: false
  use_distributed_sampler: true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_vqvae_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
