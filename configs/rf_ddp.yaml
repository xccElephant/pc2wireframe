# Rectified-Flow PC2Wireframe (8x A800 DDP) -- single-stage, single model.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/rf_ddp.yaml
#
# Multi-GPU twin of rf.yaml: identical model, DDP trainer + an LR scaled for the
# larger global batch (data.batch_size * 8). Keep in sync with rf.yaml.
seed_everything: 3407

model:
  class_path: src.module.RFWireframeModule
  init_args:
    # ----- point-cloud encoder: PTv3 backbone + latent-compressor head -----
    pc_encoder:
      in_channels: 3
      grid_size: 0.01
      cls_mode: false
      enc_depths:    [2, 2, 2, 6, 2]
      enc_channels:  [32, 64, 128, 256, 512]
      enc_num_head:  [2, 4, 8, 16, 32]
      enc_patch_size: [1024, 1024, 1024, 1024, 1024]
      dec_depths:    [2, 2, 2, 2]
      dec_channels:  [64, 64, 128, 256]
      dec_num_head:  [4, 4, 8, 16]
      dec_patch_size: [1024, 1024, 1024, 1024]
      stride:        [2, 2, 2, 2]
      enable_flash: true
      latent_num: 16
      latent_dim: 256
      compressor_heads: 8
      compressor_layers: 1

    # ----- RF velocity network (point-set DiT) -----
    rf_net:
      point_dim: 4
      cond_dim: 256
      d_model: 384
      depth: 8
      nhead: 6
      mlp_ratio: 4.0
      dropout: 0.0
      grad_checkpoint: false

    # ----- RF target / flow -----
    wf_num_points: 8192
    flow_sigma: 0.0

    # ----- ODE sampling (validation / prediction) -----
    ode_steps: 20               # RF paths are ~straight; 20 euler steps suffice
    ode_method: euler
    sample_seed: 0

    # ----- traditional reconstruction -----
    type_threshold: 0.5
    merge_radius: 0.03
    min_votes: 3

    # ----- eval metric: CCD / TA / VPE -> weighted final score (val/score) -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1
    eval_num_per_edge: 32

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 1.5e-4 (global batch is 8x larger under DDP).
    lr: 4.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/rf.yaml
  num_nodes: 1
  # All params are trainable and contribute to the loss each step, so plain DDP
  # is safe (no find_unused_parameters pass).
  strategy: ddp
  sync_batchnorm: false         # model uses Layer/GroupNorm, not BatchNorm
  use_distributed_sampler: true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: rf_wireframe_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
