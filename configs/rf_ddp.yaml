# Stage 1 -- corner Rectified Flow (8x A800 DDP).
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/rf_ddp.yaml
#
# Multi-GPU twin of rf.yaml: identical model, DDP trainer + an LR scaled for the
# larger global batch (data.batch_size * 8). Keep in sync with rf.yaml.
seed_everything: 3407

model:
  class_path: src.module.RFWireframeModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3 + trainable compressor -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth   # local Utonia checkpoint (download manually)
      grid_size: 0.01
      freeze: true
      latent_num: 64
      latent_dim: 64
      compressor_heads: 8
      compressor_layers: 1

    # ----- RF velocity network (point-set DiT) -----
    rf_net:
      point_dim: 3
      cond_dim: 64
      d_model: 384
      depth: 8
      nhead: 6
      mlp_ratio: 4.0
      dropout: 0.0
      grad_checkpoint: false

    # ----- RF target / flow -----
    wf_num_points: 1024         # MUST match data.wf_num_points (corner budget N)
    flow_sigma: 0.0
    w_xyz: 1.0

    # ----- noise<->target coupling -----
    coupling: ot
    ot_reg: 0.05
    ot_iters: 50

    # ----- ODE sampling (prediction: corner cloud -> vertices) -----
    ode_steps: 50               # RF paths are ~straight; 50 euler steps
    ode_method: euler
    sample_seed: 0

    # ----- corner dedup (sampled cloud -> vertices) -----
    dedup_eps: 0.02
    dedup_relative: true
    dedup_min_samples: 1
    # ODE-sample + dedup at validation and log val/vpe (vertex chamfer vs GT
    # corners). Required because the checkpoint monitor is val/vpe (slower val).
    val_vpe: true

    # ----- optimization -----
    # Global batch = 16 * 8 = 128 (8x the batch-16 reference). sqrt-scaled
    # LR: 1.5e-4 * sqrt(8) ~= 4.2e-4.
    lr: 4.2e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 1000
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/rf.yaml
  num_nodes: 1
  # The frozen Utonia backbone has no grads; every *trainable* param (compressor
  # + DiT) contributes to the loss each step, so plain DDP is safe (no
  # find_unused_parameters pass).
  strategy: ddp
  sync_batchnorm: false         # model uses Layer/GroupNorm, not BatchNorm
  use_distributed_sampler: true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: rf_wireframe_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_vpe={val/vpe:.4f}
        monitor: val/vpe
        verbose: false
        save_last: true
        save_top_k: 3
        mode: min
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
