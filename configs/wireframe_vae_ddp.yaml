# Stage 2/3 (8x A800 DDP) -- train the wireframe VAE (AutoencoderKLWireframe).
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/wireframe_vae_ddp.yaml
#
# Multi-GPU twin of wireframe_vae.yaml: identical model, DDP trainer + an LR
# scaled for the larger global batch (data.batch_size * 8). The curve VAE is
# FROZEN here -- set `curve_vae_ckpt` to your best stage-1 checkpoint. Keep this
# file in sync with wireframe_vae.yaml when you change the architecture.
seed_everything: 3407

model:
  class_path: src.module.WireframeVAEModule
  init_args:
    # CLR-Wire wireframe VAE. latent_channels * wireframe_latent_num <= 4096
    # and must match the stage-3 PC encoder latent (64 * 64 = 4096).
    wireframe_vae:
      latent_channels: 64
      wireframe_latent_num: 64
      max_nodes: 768                # data.yaml max_vertices drops >768-vertex samples
      max_curves_num: 1024          # data.yaml max_edges drops >1024-edge samples
      curve_latent_dim: 12          # MUST match the curve VAE: 3 * (32 / 2**3)
      attn_encoder_depth: 4
      attn_decoder_self_depth: 12
      attn_decoder_cross_depth: 2
      attn_dim: 768
      num_heads: 12
      adj_dim: 128
      use_latent_pos_emb: true

    # Frozen curve VAE -- MUST match the stage-1 architecture exactly.
    curve_vae:
      latent_channels: 3
      sample_points_num: 32
      down_block_types: ["DownBlock1D", "DownBlock1D", "DownBlock1D"]
      block_out_channels: [128, 256, 256]
      layers_per_block: 2

    # ----- frozen curve VAE warm-start (set to your stage-1 best ckpt) -----
    curve_vae_ckpt: null

    # ----- eval metric: CCD / TA / VPE -> weighted final score (val/score) -----
    # Measures the VAE's own reconstruction (encode GT -> decode -> wireframe).
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1
    eval_num_per_edge: 32

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 1.0e-4 (global batch is 8x larger under DDP).
    lr: 2.8e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/wireframe_vae.yaml
  num_nodes: 1
  # find_unused_parameters: conditionally-used heads + frozen curve VAE -> permissive.
  strategy: ddp_find_unused_parameters_true
  sync_batchnorm: false         # models use Layer/GroupNorm, not BatchNorm
  use_distributed_sampler: true # shard the dataset across ranks
  precision: 32-true
  # Gradient clipping is handled by the LightningModule (model.grad_clip) via
  # configure_gradient_clipping; do not also set it here (would be redundant).
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: stage2_wireframe_vae_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
