data:
  class_path: src.data.WireframeGrouperDataModule
  init_args:
    # ----- paths (relative to project root); shared with the RF stage -----
    data_root: data
    train_edge_subdir: train/sample_edge
    train_pointcloud_subdir: train/sample_pointcloud
    predict_pointcloud_subdir: test/sample_pointcloud
    split_path: data/split.json
    recursive_glob: false

    # ----- train/val split (reuses the RF-stage split file) -----
    use_val: true
    auto_build_split: true
    train_ratio: 0.9
    split_seed: 42

    # ----- graph / point-cloud / RF-target format (must match the RF stage) -----
    vertex_merge_tol: 0.0001
    # Match the RF stage caps so both stages train on the same size distribution
    # and 8192 points stay dense enough per edge.
    max_vertices: 1024
    max_edges: 1024
    num_edge_points: 32
    max_pc_points: 0
    wf_num_points: 8192
    min_edges: 1
    max_load_retries: 64

    # ----- grouper input augmentation (bridges clean GT -> noisy RF output) -----
    # jitter is applied to the TRAIN split only; val stays clean for honest metrics.
    jitter_std: 0.005        # per-point Gaussian xyz jitter (normalized frame)
    # Guarantee every GT edge keeps at least this many sampled anchor points
    # (so short edges are never dropped under pure arc-length sampling).
    min_pts_per_edge: 2

    # ----- data loader -----
    shuffle: true
    num_workers: 8
    batch_size: 64
    pin_memory: true
    prefetch_factor: 2
    persistent_workers: true
