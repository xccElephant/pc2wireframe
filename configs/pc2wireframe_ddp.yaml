# Stage 2/2 (8x A800 DDP) -- train the end-to-end point-cloud -> wireframe model.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/pc2wireframe_ddp.yaml \
#       --model.curve_vae_ckpt <stage1.ckpt>
#
# Multi-GPU twin of pc2wireframe.yaml: identical model, DDP trainer + an LR
# scaled for the larger global batch (data.batch_size * 8). The curve VAE
# (stage 1) is frozen -- set its ckpt path below. Keep in sync with
# pc2wireframe.yaml.
seed_everything: 3407

model:
  class_path: src.module.PC2WireframeModule
  init_args:
    # ----- point-cloud encoder: PTv3 backbone + latent-compressor head -----
    pc_encoder:
      in_channels: 3          # 3 = xyz, 6 = xyz + normals
      grid_size: 0.01         # PTv3 voxel size (data is normalized to ~[-1,1])
      cls_mode: false         # false = dense decoder features (better localized)
      enc_depths:    [2, 2, 2, 6, 2]
      enc_channels:  [32, 64, 128, 256, 512]
      enc_num_head:  [2, 4, 8, 16, 32]
      enc_patch_size: [1024, 1024, 1024, 1024, 1024]
      dec_depths:    [2, 2, 2, 2]
      dec_channels:  [64, 64, 128, 256]
      dec_num_head:  [4, 4, 8, 16]
      dec_patch_size: [1024, 1024, 1024, 1024]
      stride:        [2, 2, 2, 2]
      enable_flash: true
      # 16 * 256 = 4096 floats (competition latent budget).
      latent_num: 16
      latent_dim: 256
      compressor_heads: 8
      variational: true

    # ----- transformer wireframe decoder (node set + edge set) -----
    decoder:
      num_node_queries: 512     # >= data.yaml max_vertices
      num_edge_queries: 1024    # >= data.yaml max_edges
      d_model: 512
      nhead: 8
      dim_ff: 2048
      node_layers: 6
      edge_layers: 4
      endpoint_dim: 128
      dropout: 0.1

    # ----- frozen curve VAE -- MUST match the stage-1 architecture -----
    curve_vae:
      latent_channels: 3
      sample_points_num: 32
      down_block_types: ["DownBlock1D", "DownBlock1D", "DownBlock1D"]
      block_out_channels: [128, 256, 256]
      layers_per_block: 2

    # ----- frozen curve VAE warm-start (set to your stage-1 best ckpt) -----
    curve_vae_ckpt: null

    # ----- loss weights -----
    kl_weight: 1.0e-4
    node_coord_weight: 5.0
    node_exist_weight: 1.0
    edge_exist_weight: 2.0
    endpoint_weight: 1.0
    curve_weight: 2.0
    topo_degree_weight: 0.5   # soft per-node degree consistency
    topo_dedup_weight: 0.5    # soft simple-graph dedup / self-loop penalty
    focal_alpha: 0.25
    focal_gamma: 2.0
    match_node_coord: 5.0
    match_node_exist: 1.0
    match_edge_exist: 0.5
    match_edge_topk: 64       # edge match candidates per GT edge (0 = full Ne x ne)
    node_exist_pos_weight: 10.0

    # ----- inference / val reconstruction thresholds -----
    vertex_threshold: 0.5
    edge_threshold: 0.5

    # ----- eval metric: CCD / TA / VPE -> weighted final score (val/score) -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1
    eval_num_per_edge: 32

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 1.5e-4 (global batch is 8x larger under DDP).
    lr: 4.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 200
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/pc2wireframe.yaml
  num_nodes: 1
  # find_unused_parameters: frozen curve VAE + conditionally-used heads -> permissive.
  strategy: ddp_find_unused_parameters_true
  sync_batchnorm: false         # models use Layer/GroupNorm, not BatchNorm
  use_distributed_sampler: true # shard the dataset across ranks
  precision: 32-true
  # Gradient clipping is handled by the LightningModule (model.grad_clip) via
  # configure_gradient_clipping; do not also set it here (would be redundant).
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: stage2_pc2wireframe_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
