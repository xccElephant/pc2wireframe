# Wireframe grouper (8x A800 DDP) -- multi-GPU twin of grouper.yaml.
# Identical model; DDP trainer + an LR scaled for the larger global batch
# (data.batch_size * 8). Keep in sync with grouper.yaml.
#
# Run with:
#   python -m src.main fit --config configs/grouper_data.yaml --config configs/grouper_ddp.yaml
seed_everything: 3407

model:
  class_path: src.module.WireframeGrouperModule
  init_args:
    # ----- grouper network (stock TransformerEncoder backbone + per-point heads)
    grouper:
      point_dim: 4
      d_model: 256
      depth: 6
      nhead: 8
      mlp_ratio: 4.0
      dropout: 0.0
      embed_dim: 8

    # ----- loss weights -----
    w_score: 1.0
    w_vertex: 1.0
    w_endpoint: 1.0
    w_arclen: 1.0
    w_embed: 0.2
    embed_delta_var: 0.5
    embed_delta_dist: 1.5

    # ----- decode (validation) -----
    vertex_thresh: 0.5
    vertex_merge_radius: 0.01
    vertex_merge_relative: true
    split_by_embedding: true
    embed_eps: 0.5
    min_edge_points: 3
    num_per_edge: 32

    # ----- eval metric: CCD / TA / VPE -> weighted final score -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1

    # ----- optimization -----
    # global batch = 64 * 8 = 512; LR ~sqrt-scaled from the batch-16 base.
    lr: 1.6e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/grouper.yaml
  num_nodes: 1
  # All params are trainable and contribute to the loss each step, so plain DDP
  # is safe (no find_unused_parameters pass).
  strategy: ddp
  sync_batchnorm: false         # model uses LayerNorm, not BatchNorm
  use_distributed_sampler: true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_grouper_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
