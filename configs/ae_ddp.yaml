# Single-stage WireframeAE (8x A800 DDP) -- one trainable autoencoder.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/ae_ddp.yaml
#
# Multi-GPU twin of ae.yaml: identical model, DDP trainer + an LR scaled for the
# larger global batch (data.batch_size * 8). Keep in sync with ae.yaml.
seed_everything: 3407

model:
  class_path: src.module.WireframeAEModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3 + trainable compressor -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth
      grid_size: 0.01
      freeze: true
      latent_num: 16
      latent_dim: 256
      # must divide the compressor in_dim = Utonia enc_channels[-1] = 576
      compressor_heads: 8
      compressor_layers: 1

    # ----- WireframeAE decoder -----
    decoder:
      latent_dim: 256
      num_queries: 512
      d_model: 256
      nhead: 8
      num_layers: 6
      mlp_ratio: 4.0
      dropout: 0.0
      edge_hidden: 256

    # ----- loss weights -----
    w_vertex: 1.0
    w_alive: 1.0
    w_edge: 1.0
    w_edge_type: 1.0
    w_edge_param: 1.0
    w_curve_geom: 0.1           # curve Chamfer (now NaN-safe; see ae.yaml note)
    w_aux: 1.0                  # DETR aux loss on each intermediate decoder layer
    alive_pos_weight: 5.0
    edge_neg_ratio: 3.0
    match_alive_weight: 0.2     # Hungarian cost reward for confident-alive queries
    curve_type_class_weights: [1.0, 3.0, 9.0]
    geom_num_per_edge: 32

    # ----- decode (validation / predict) -----
    vertex_thresh: 0.5
    edge_thresh: 0.5
    max_decode_vertices: 512
    num_per_edge: 32

    # ----- eval metric -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1

    # ----- optimization -----
    # LR ~sqrt(8)x the single-GPU 3e-4 (global batch is 8x larger under DDP).
    lr: 8.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 8                    # 8x A800; for single GPU use configs/ae.yaml
  num_nodes: 1
  # The frozen Utonia backbone has no grads; every *trainable* param (compressor
  # + decoder) contributes to the loss each step, so plain DDP is safe (no
  # find_unused_parameters pass).
  strategy: ddp
  sync_batchnorm: false         # model uses Layer/GroupNorm, not BatchNorm
  use_distributed_sampler: true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_ae_ddp
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
