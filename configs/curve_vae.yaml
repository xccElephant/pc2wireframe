# Stage 1/3 -- train the per-curve neural parametric VAE (AutoencoderKL1D).
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/curve_vae.yaml
#
# The curve VAE autoencodes canonicalised GT curves (endpoints pinned to
# [-1,0,0]/[1,0,0]). Its checkpoint is the input to stages 2 and 3, where it is
# loaded frozen to produce the 12-d per-curve latent targets / decode curves.
seed_everything: 3407

model:
  class_path: src.module.CurveVAEModule
  init_args:
    curve_vae:
      latent_channels: 3              # 3 channels x 4 latent positions = 12-d
      sample_points_num: 16           # encoder length; decode can query any length
      # The attention VAE has no conv blocks: len(down_block_types) only sets the
      # latent length (16 / 2**2 = 4) and block_out_channels[-1] sets d_model.
      down_block_types: ["DownBlock1D", "DownBlock1D"]
      block_out_channels: [128, 256]
      layers_per_block: 2             # transformer layers in encoder/decoder

    # ----- optimization -----
    lr: 1.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 1
  accelerator: gpu
  devices: 1                    # single GPU; use configs/curve_vae_ddp.yaml for 8x A800 DDP
  num_nodes: 1
  strategy: auto
  precision: 32-true
  # Gradient clipping is handled by the LightningModule (model.grad_clip) via
  # configure_gradient_clipping; do not also set it here (would be redundant).
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: stage1_curve_vae
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        # Lower reconstruction loss is better.
        filename: epoch={epoch:03d}-val_loss={val/loss:.4f}
        monitor: val/loss
        verbose: false
        save_last: true
        save_top_k: 3
        mode: min
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
