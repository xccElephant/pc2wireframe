# Wireframe grouper -- the learned replacement for the fragile traditional
# reconstruction. Trains on GT wireframe point sets (+ augmentation to simulate
# the RF stage's noise); no point-cloud encoder involved.
#
# Run with:
#   python -m src.main fit --config configs/grouper_data.yaml --config configs/grouper.yaml
#
# anchor set (xyz) -> WireframeGrouper (point transformer) -> per-point
# {endpoint_offset, embedding, curve_type, anchor, arclen}
# -> group_wireframe decode -> wireframe -> CCD / TA / VPE.
seed_everything: 3407

model:
  class_path: src.module.WireframeGrouperModule
  init_args:
    # ----- grouper network (stock TransformerEncoder backbone + per-point heads)
    grouper:
      point_dim: 3            # (x, y, z) anchor points
      d_model: 256
      depth: 6
      nhead: 8
      mlp_ratio: 4.0
      dropout: 0.0
      embed_dim: 8            # instance-embedding dimension

    # ----- loss weights (all teacher-forced) -----
    w_endpoint: 1.0           # endpoint+anchor voting (order-invariant smooth-L1)
    w_anchor: 1.0             # anchor (t=1/3, t=2/3) voting
    w_curve_type: 1.0         # per-point line/arc/bezier CE (class weighted)
    w_arclen: 1.0             # arc-length regression (MSE)
    w_embed: 0.2              # discriminative instance embedding (kept small)
    w_topo: 0.5               # endpoint->GT-vertex assignment CE
    w_curve_geom: 0.1         # teacher-forced parsed-curve Chamfer (small)
    embed_delta_var: 0.5      # pull margin (De Brabandere et al.)
    embed_delta_dist: 1.5     # push margin
    # CE class weights [line, arc, bezier]; lines dominate, bezier is rarest,
    # so escalate the weights to balance the per-point CE.
    curve_type_class_weights: [1.0, 3.0, 9.0]
    topo_tau: 0.1             # softmax temperature for the topo-assignment CE
    geom_num_per_edge: 32     # points sampled per edge for the geom Chamfer

    # ----- decode (validation) -----
    vertex_merge_radius: 0.01 # vertex DBSCAN eps; with vertex_merge_relative
    vertex_merge_relative: true  # = fraction of the point-set bbox diagonal
    split_by_embedding: true  # split same-endpoint edges via embedding DBSCAN
    embed_eps: 0.5            # DBSCAN eps in embedding space (~delta_dist)
    min_edge_points: 3        # drop edges with fewer supporting points
    num_per_edge: 32          # points per reconstructed edge curve

    # ----- eval metric: CCD / TA / VPE -> weighted final score -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1

    # ----- optimization -----
    # LR ~sqrt(4)x the batch-16 base (batch is now 64).
    lr: 6.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 1
  num_nodes: 1
  strategy: auto
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_grouper
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
