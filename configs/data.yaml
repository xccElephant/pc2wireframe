data:
  class_path: src.data.WireframeDataModule
  init_args:
    # ----- paths (relative to project root) -----
    data_root: data
    # Cleaned GT wireframes (scripts/clean_wireframe.py); filenames match the
    # originals so train/sample_pointcloud still resolves by stem.
    train_edge_subdir: train_clean/sample_edge
    train_pointcloud_subdir: train/sample_pointcloud
    predict_pointcloud_subdir: test/sample_pointcloud
    # Own split: split files pin full edge paths, so the cleaned run can't reuse
    # data/split.json. Auto-built from the cleaned dir on first run.
    split_path: data/split_clean.json
    recursive_glob: false

    # ----- train/val split (test/ has no GT edges, so val is carved from train) -----
    # Build once with: python scripts/make_split.py
    # use_val: true  -> train on saved "train" list, validate on "val".
    # use_val: false -> train on ALL data (train + val), no validation loader.
    use_val: true
    auto_build_split: true
    train_ratio: 0.9
    split_seed: 42

    # ----- graph / point-cloud format -----
    vertex_merge_tol: 0.0001
    # Oversize samples are SKIPPED (never truncated). Caps match the decoder
    # queries (num_node_queries / num_edge_queries) and are tuned to the cleaned
    # train distribution (data/_clean_report.json).
    max_vertices: 512
    max_edges: 1024
    num_edge_points: 32
    pc_num_points: 4096
    min_edges: 1
    max_load_retries: 64

    # ----- data loader -----
    shuffle: true
    num_workers: 8
    batch_size: 16
    pin_memory: true
    prefetch_factor: 2
    persistent_workers: true
