data:
  class_path: src.data.WireframeDataModule
  init_args:
    # ----- paths (relative to project root) -----
    data_root: data
    train_edge_subdir: train/sample_edge
    train_pointcloud_subdir: train/sample_pointcloud
    predict_pointcloud_subdir: test/sample_pointcloud
    # Split over the raw edge dir; auto-built on first run.
    split_path: data/split.json
    recursive_glob: false

    # ----- train/val split (test/ has no GT edges, so val is carved from train) -----
    # Build once with: python scripts/make_split.py
    # use_val: true  -> train on saved "train" list, validate on "val".
    # use_val: false -> train on ALL data (train + val), no validation loader.
    use_val: true
    auto_build_split: true
    train_ratio: 0.9
    split_seed: 42

    # ----- graph format -----
    vertex_merge_tol: 0.0001
    # max_vertices doubles as the decoder vertex-query budget cap: a wireframe
    # with more than 512 vertices is skipped (must match decoder.num_queries).
    # The dataset is already unit-normalized ([-1, 1]); no extra normalization.
    max_vertices: 512
    # max_edges doubles as the decoder edge-query budget cap: a wireframe with
    # more than 512 edges (after loop splitting) is skipped (must match
    # decoder.num_edge_queries).
    max_edges: 512
    num_edge_points: 32
    # Closed-loop edges (a circle = single junction vertex, start ~= end) cannot
    # be anchored by two endpoints, so split them into two open arcs at the far
    # point: an edge is treated as a loop when |end - start| < loop_close_tol AND
    # its polyline arc length > loop_min_arc (a real loop, not a tiny stub).
    split_loops: true
    loop_close_tol: 0.01
    loop_min_arc: 0.05
    # Complex edges (big arcs / spirals / multi-winding splines whose arc length
    # >> endpoint chord) cannot be expressed by a single 12-d curve latent, so
    # split them recursively at the max-deviation point into simpler sub-edges
    # (inserting vertices) until arclen/chord <= complex_ratio or max_depth.
    split_complex: true
    complex_ratio: 1.6
    complex_max_depth: 4
    complex_min_arc: 0.05
    # Input point cloud kept at NATIVE size and packed for PTv3 (coord+offset);
    # 0 = keep all points. Set positive only as a memory safety cap.
    max_pc_points: 0
    min_edges: 1
    # Skip (training) point clouds with fewer than this many points.
    min_pc_points: 100
    max_load_retries: 64

    # ----- data loader -----
    shuffle: true
    num_workers: 8
    batch_size: 16
    pin_memory: true
    prefetch_factor: 2
    persistent_workers: true
