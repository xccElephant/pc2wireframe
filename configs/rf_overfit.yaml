# Stage-1 single-sample OVERFIT sanity check.
#
# Pin the whole pipeline to ONE shape and use it for both train and val, then
# train for many steps: if the RF stage is healthy it must be able to memorize
# that single corner point set (Pred ~ GT). If it still collapses to a blob,
# the problem is the objective/coupling, not data scale or training length.
#
# Append this AFTER data.yaml + rf.yaml so it overrides the relevant knobs:
#   python -m src.main fit \
#       --config configs/data.yaml --config configs/rf.yaml \
#       --config configs/rf_overfit.yaml
#
# Inspect the result with the stage-1 visualizer on the same shape:
#   python scripts/vis_rf_val.py \
#       --ckpt logs/pc2wireframe/<run-id>/checkpoints \
#       --files data/train/sample_edge/00030026_0ef34aa1b15748a5b4ad7c0e_step_016.npz \
#       --split all --out logs/rf_overfit.png

data:
  init_args:
    # Both train and val datasets use exactly this one file (split bypassed).
    overfit_files:
      - data/train/sample_edge/00030026_0ef34aa1b15748a5b4ad7c0e_step_016.npz
    # Disable the oversize skip: this shape has 1095 edges (> data.yaml's
    # max_edges=1024) and would otherwise be filtered out -> "No valid sample".
    # For a single-shape overfit we want it kept regardless of size.
    max_vertices: 0
    max_edges: 0
    # Fix the RF target so the SAME wf_points is seen every epoch -- otherwise
    # the vertex upsampling (random with replacement) reshuffles the target each
    # step and the sample can never be memorized crisply (residual blur).
    target_seed: 0
    use_val: true
    batch_size: 1
    # Single, stable sample: no shuffling, no worker re-seeding randomness.
    shuffle: false
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null

model:
  init_args:
    # OT coupling is the whole point of this experiment (inherited from rf.yaml,
    # restated here so the overfit run is self-documenting).
    coupling: ot
    ot_reg: 0.05
    ot_iters: 50
    # Push the LR schedule's horizon out to the overfit length.
    max_steps: 5000
    warmup_steps: 50

trainer:
  max_epochs: 5000
  check_val_every_n_epoch: 100
  limit_train_batches: 1
  limit_val_batches: 1
  log_every_n_steps: 1
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: rf_overfit
      log_model: false
