# VQVAE WireframeAE -- single-stage end-to-end joint vertex+edge model (1 GPU).
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/vqvae.yaml
#
# point cloud -> frozen Utonia PTv3 (multi-scale per-stage features)
# -> per-scale continuous tokens -> per-scale ResidualVQ -> flat indices
# (<=4096, the submission) -> JointSetDecoder (512 vertex queries + 512 edge
# queries, mutual cross-attn) -> vertex (existence + coord), edge (existence +
# 12-d curve VAE latent), edge->vertex association matrix A -> wireframe
# {vertices, edge_index, edge_points}. The per-curve VAE is trained JOINTLY
# (no freezing); reconstruction picks endpoints as the top-2 vertices per edge
# under A and denormalises the decoded canonical curve onto them.
# For 8x A800 DDP use vqvae_ddp.yaml.
seed_everything: 3407

model:
  class_path: src.module.JointWireframeModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3, multi-scale compressors -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth   # local Utonia checkpoint (download manually)
      grid_size: 0.01           # voxel dedup + PTv3 grid (raw ~unit frame)
      freeze: true              # backbone frozen (eval + no_grad), compressors train
      # all 5 PTv3 enc stages (finer -> coarser); finest stages get most tokens
      # so fine detail reaches the latent (stage channels 54/108/216/432/576).
      scale_tokens: [192, 128, 96, 64, 32]
      scale_stages: [0, 1, 2, 3, 4]
      latent_dim: 256
      compressor_heads: 6       # must divide every used stage's enc_channels
      compressor_layers: 1

    # ----- per-scale residual vector quantizer (the discrete latent) -----
    quantizer:
      # budget = sum_s N_s * n_q = (192+128+96+64+32)*8 = 512*8 = 4096 (== cap).
      n_q: 8
      codebook_size: [8192, 4096, 2048, 1024, 512]  # shrink coarse scales
      kmeans_init: true
      kmeans_iters: 10
      threshold_ema_dead_code: 4   # revive dead codes more aggressively
      decay: 0.95                  # faster EMA -> coarse books adapt
      commitment_weight: 0.25

    # ----- per-curve VAE (trained jointly; 12-d per-edge latent contract) -----
    curve_vae:
      latent_channels: 3              # 3 channels x 4 latent positions = 12-d
      sample_points_num: 32           # encoder length; decode can query any length
      down_block_types: ["DownBlock1D", "DownBlock1D", "DownBlock1D"]
      block_out_channels: [128, 256, 256]
      layers_per_block: 2

    # ----- joint vertex+edge decoder -----
    decoder:
      latent_dim: 256           # = pc_encoder.latent_dim
      num_vertex_queries: 512   # vertex-set size (= data.max_vertices)
      num_edge_queries: 512     # edge-set size (max edges per shape)
      d_model: 256
      nhead: 8
      num_layers: 6             # joint decoder layers (self + mem-cross + mutual)
      mlp_ratio: 4.0
      dropout: 0.0
      assoc_dim: 64             # low-rank edge<->vertex association projection
      coord_tanh: true          # squash vertex coords into the unit cube [-1,1]

    # ----- loss weights (joint set criterion) -----
    w_vexist: 2.0               # vertex existence (calibrated BCE)
    w_vcoord: 5.0               # matched-vertex coordinate L1
    w_eexist: 2.0               # edge existence (calibrated BCE)
    w_curve: 5.0                # curve-space L1 (decode(lat_pred) vs GT canonical)
    w_curve_endpoint: 2.0       # curve endpoint L1 (canonical [-1,0,0]/[1,0,0])
    w_lat_reg: 0.1              # small on-manifold L2(lat_pred, sg(mu_k))
    w_anchor: 5.0               # curve-VAE autoencoding recon L1 (anti-collapse)
    w_anchor_endpoint: 2.0      # curve-VAE autoencoding endpoint L1
    w_assoc: 2.0                # association BCE (matched rows / vertex cols)
    assoc_pos_weight_max: 64.0  # cap on association BCE pos_weight (2-of-V sparse)
    w_commit: 0.25              # VQ commitment loss (ramped in after warmup)
    focal_gamma: 0.0            # 0 -> calibrated BCE; >0 restores focal existence
    focal_alpha: 0.5
    exist_label_smoothing: 0.02
    exist_pos_weight_max: 20.0
    match_w_vcoord: 1.0         # vertex Hungarian cost: coord-L1 weight
    match_w_exist: 0.5          # Hungarian cost: existence reward
    match_w_inc: 1.0            # edge Hungarian cost: incidence (-logA) weight
    match_w_lat: 1.0            # edge Hungarian cost: latent-L1 weight

    # ----- schedules -----
    quant_warmup_steps: 2000    # continuous-z warmup (codebooks still EMA-update)
    commit_ramp_steps: 2000     # commit weight 0 -> w_commit linear ramp
    kl_weight: 1.0e-6           # final curve-VAE KL weight
    kl_ramp_steps: 2000         # KL weight 0 -> kl_weight ramp
    match_warmup_steps: 2000    # steps with w_inc=0 (A is random early)
    match_inc_ramp_steps: 2000  # then w_inc 0 -> 1 ramp (incidence drives match)

    # ----- decode (validation / predict): threshold the predicted sets -----
    vthr: 0.5                   # vertex existence sigmoid threshold
    ethr: 0.5                   # edge existence sigmoid threshold
    min_vertices: 2             # floor: never emit < 2 vertices
    min_edges: 1                # floor: never emit an empty wireframe
    num_per_edge: 32            # points per reconstructed edge curve

    # ----- eval metric: CCD / TA / VPE -> weighted final score -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_match_thresh: 0.1

    # ----- threshold-robust checkpoint selection (vthr, ethr grid) -----
    # val/score is recomputed over this grid each epoch; the max is logged as
    # val/score_best (monitored by ModelCheckpoint).
    val_vthr_grid: [0.3, 0.4, 0.5, 0.6]
    val_ethr_grid: [0.3, 0.4, 0.5, 0.6, 0.7]

    # ----- optimization -----
    lr: 3.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 1000
    # LR cosine horizon: only a fallback -- the scheduler primarily uses
    # trainer.estimated_stepping_batches (tracks max_epochs/devices). Kept
    # proportional to max_epochs (~1000 steps/epoch on 1 GPU x 300 epochs).
    max_steps: 300000
    grad_clip: 1.0

trainer:
  max_epochs: 300
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 1                    # single GPU; use configs/vqvae_ddp.yaml for 8x A800
  num_nodes: 1
  strategy: auto
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_vqvae
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score_best:.4f}
        monitor: val/score_best
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
