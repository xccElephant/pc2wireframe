# VQVAE WireframeAE -- end-to-end discrete autoencoder (single GPU).
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/vqvae.yaml
#
# point cloud -> frozen Utonia PTv3 (multi-scale per-stage features)
# -> per-scale continuous tokens -> per-scale ResidualVQ -> flat indices
# (<=4096, the submission) -> EdgeSetDecoder (512 edge queries: self-attn edges
# + cross-attn z_q -> per-edge existence + 32 ordered curve points) -> wireframe
# {vertices, edge_index, edge_points} (vertices from union-find endpoint merge).
# For 8x A800 DDP use vqvae_ddp.yaml.
seed_everything: 3407

model:
  class_path: src.module.WireframeAEModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3, multi-scale compressors -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth   # local Utonia checkpoint (download manually)
      grid_size: 0.01           # voxel dedup + PTv3 grid (raw ~unit frame)
      freeze: true              # backbone frozen (eval + no_grad), compressors train
      # all 5 PTv3 enc stages (finer -> coarser); finest stages get most tokens
      # so fine detail reaches the latent (stage channels 54/108/216/432/576).
      scale_tokens: [192, 128, 96, 64, 32]
      scale_stages: [0, 1, 2, 3, 4]
      latent_dim: 256
      compressor_heads: 6       # must divide every used stage's enc_channels
      compressor_layers: 1

    # ----- per-scale residual vector quantizer (the discrete latent) -----
    quantizer:
      # budget = sum_s N_s * n_q = (192+128+96+64+32)*8 = 512*8 = 4096 (== cap).
      n_q: 8
      # per-scale codebook sizes (finer -> coarser): shrink the coarse scales
      # (few tokens never fill a big book -> collapse) to match utilisation.
      codebook_size: [8192, 4096, 2048, 1024, 512]
      kmeans_init: true
      kmeans_iters: 10
      threshold_ema_dead_code: 4   # revive dead codes more aggressively
      decay: 0.95                  # faster EMA (was 0.99) -> coarse books adapt
      commitment_weight: 0.25

    # ----- edge-set decoder (512 edge queries: self-attn + cross-attn z_q) -----
    decoder:
      latent_dim: 256           # = pc_encoder.latent_dim
      num_edge_queries: 512     # edge-set size (max edges per shape)
      sample_points_num: 32     # ordered points per edge (= data.num_edge_points)
      d_model: 256
      nhead: 8
      num_layers: 6             # transformer decoder layers (self + cross attn)
      mlp_ratio: 4.0
      dropout: 0.0
      points_hidden: 256        # per-edge points MLP hidden width
      chord_residual: true      # endpoints absolute + interior = chord + offset

    # ----- loss weights (edge-set criterion) -----
    w_exist: 2.0                # edge existence (calibrated BCE, see focal_gamma)
    w_points: 5.0               # ordered per-point L1 (matched edges, dir-min)
    w_endpoint: 8.0             # endpoint (pts[0]/pts[-1]) L1 (shared vertices)
    w_sagitta: 2.0              # chord-residual match (learn real curvature)
    w_smooth: 0.05              # GT-relative 2nd-diff smoothness (only straightens
                                # GT-straight edges; small)
    w_seglen: 0.0               # segment-length-variance (off; penalised curvature)
    w_consistency: 2.0          # shared-GT-vertex variance + abs anchor (anti-float)
    w_commit: 0.25              # VQ commitment loss (ramped in after warmup)
    focal_gamma: 0.0            # 0 -> calibrated BCE (pos_weight + label smooth);
                                # >0 restores the old focal existence loss
    focal_alpha: 0.5            # focal balance (only used when focal_gamma > 0)
    exist_label_smoothing: 0.02 # existence BCE label smoothing (anti-saturation)
    exist_pos_weight_max: 20.0  # cap on per-shape BCE pos_weight (#neg / #pos)
    curv_l1_scale: 4.0          # up-weight per-point L1 of curved GT edges by sagitta
    match_w_geo: 1.0            # Hungarian cost: endpoint-L1 weight
    match_w_exist: 0.5          # Hungarian cost: existence reward

    # ----- quantization schedule -----
    quant_warmup_steps: 2000    # continuous-z warmup (codebooks still EMA-update)
    commit_ramp_steps: 2000     # commit weight 0 -> w_commit linear ramp

    # ----- decode (validation / predict): endpoint aggregation -----
    edge_thresh: 0.5            # edge existence sigmoid threshold
    tau_merge: 0.015            # union-find endpoint merge radius (shared vertex)
    topk_edges: 0               # keep top-k most-confident kept edges (0 = all)
    min_edges: 1                # floor: fall back to top-k if too few clear the
                                # threshold (never emit an empty wireframe)
    num_per_edge: 32            # points per reconstructed edge curve

    # ----- eval metric: CCD / TA / VPE -> weighted final score -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_match_thresh: 0.1

    # ----- threshold-robust checkpoint selection -----
    # val/score is recomputed over this grid each epoch; the max is logged as
    # val/score_best (monitored by ModelCheckpoint). tau grid null -> uses
    # tau_merge above.
    val_edge_thresh_grid: [0.3, 0.4, 0.5, 0.6, 0.7]
    val_tau_merge_grid: null
    val_topk_edges_grid: [0, 64, 128]   # also sweep the top-k edge cap

    # ----- optimization -----
    lr: 3.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 1000
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 1                    # single GPU; use configs/vqvae_ddp.yaml for 8x A800
  num_nodes: 1
  strategy: auto
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: wireframe_vqvae
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score_best:.4f}
        monitor: val/score_best
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
