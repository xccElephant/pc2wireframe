# Rectified-Flow PC2Wireframe -- single-stage, single trainable model.
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/rf.yaml
#
# point cloud -> UtoniaEncoder (frozen PTv3 + trainable latent compressor)
# -> RFPointSetVelocity (point-set DiT) -> ODE-sampled point set (xyz, type)
# -> traditional reconstruction -> wireframe. For 8x A800 DDP use rf_ddp.yaml.
seed_everything: 3407

model:
  class_path: src.module.RFWireframeModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3 + trainable compressor -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth   # local Utonia checkpoint (download manually)
      grid_size: 0.01           # voxel dedup + PTv3 grid (data normalized to ~[-1,1])
      freeze: true              # backbone frozen (eval + no_grad), compressor trains
      # 64 * 64 = 4096 floats (competition latent budget).
      latent_num: 64
      latent_dim: 64
      compressor_heads: 8
      compressor_layers: 1

    # ----- RF velocity network (point-set DiT) -----
    rf_net:
      point_dim: 4              # (x, y, z, type)
      cond_dim: 64              # = pc_encoder.latent_dim
      d_model: 384
      depth: 8
      nhead: 6
      mlp_ratio: 4.0
      dropout: 0.0
      # Flash/mem-efficient attention keeps 8192-point self-attn at O(N) memory;
      # flip this on if you raise depth / d_model / batch_size and hit OOM.
      grad_checkpoint: false

    # ----- RF target / flow -----
    wf_num_points: 8192         # MUST match data.wf_num_points
    flow_sigma: 0.0             # 1-rectified flow (TorchCFM sigma=0)
    coupling: ot                # ot = minibatch-OT (xyz cost) | independent
    w_xyz: 1.0                  # weight on the xyz velocity-MSE loss
    w_type: 1.0                 # weight on the type x1-prediction BCE loss
    type_pos_weight: 10.0       # BCE pos_weight ~ vertex inverse frequency

    # ----- ODE sampling (validation / prediction) -----
    ode_steps: 50               # RF paths are ~straight; 50 euler steps
    ode_method: euler           # fixed-step torchdiffeq solver
    sample_seed: 0              # fixed x0 seed -> deterministic reconstruction

    # ----- traditional reconstruction -----
    type_threshold: 0.5         # type >= thr -> vertex point
    merge_radius: 0.03          # vertex-point cluster merge radius
    min_votes: 3                # min nearest-two votes for an edge

    # ----- eval metric: CCD / TA / VPE -> weighted final score (val/score) -----
    eval_w_ccd: 0.3
    eval_w_ta: 0.4
    eval_w_vpe: 0.3
    eval_ccd_tau: 0.1
    eval_vpe_tau: 0.1
    eval_match_thresh: 0.1
    eval_num_per_edge: 32

    # ----- optimization -----
    lr: 1.5e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 1                    # single GPU; use configs/rf_ddp.yaml for 8x A800 DDP
  num_nodes: 1
  strategy: auto
  precision: 32-true
  # Gradient clipping is handled by the LightningModule (model.grad_clip) via
  # configure_gradient_clipping; do not also set it here (would be redundant).
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: rf_wireframe
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_score={val/score:.4f}
        monitor: val/score
        verbose: false
        save_last: true
        save_top_k: 3
        mode: max
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
