# Stage 1 -- corner Rectified Flow. Single trainable model (PTv3 encoder + RF
# velocity net).
# Run with:
#   python -m src.main fit --config configs/data.yaml --config configs/rf.yaml
#
# point cloud -> UtoniaEncoder (frozen PTv3 + trainable latent compressor)
# -> RFPointSetVelocity (point-set DiT) -> ODE-sampled corner point set (xyz)
# -> DBSCAN dedup -> vertices. For 8x A800 DDP use rf_ddp.yaml.
seed_everything: 3407

model:
  class_path: src.module.RFWireframeModule
  init_args:
    # ----- point-cloud encoder: frozen Utonia PTv3 + trainable compressor -----
    pc_encoder:
      utonia: logs/utonia/utonia.pth   # local Utonia checkpoint (download manually)
      grid_size: 0.01           # voxel dedup + PTv3 grid (data normalized to ~[-1,1])
      freeze: true              # backbone frozen (eval + no_grad), compressor trains
      # 64 * 64 = 4096 floats (competition latent budget).
      latent_num: 64
      latent_dim: 64
      compressor_heads: 8
      compressor_layers: 1

    # ----- RF velocity network (point-set DiT) -----
    rf_net:
      point_dim: 3              # (x, y, z) corner points
      cond_dim: 64              # = pc_encoder.latent_dim
      d_model: 384
      depth: 8
      nhead: 6
      mlp_ratio: 4.0
      dropout: 0.0
      # Flash/mem-efficient attention keeps the self-attn at O(N) memory; flip
      # this on if you raise depth / d_model / batch_size and hit OOM.
      grad_checkpoint: false

    # ----- RF target / flow -----
    wf_num_points: 1024         # MUST match data.wf_num_points (corner budget N)
    flow_sigma: 0.0             # 1-rectified flow (TorchCFM sigma=0)
    w_xyz: 1.0                  # weight on the xyz velocity-MSE loss

    # ----- noise<->target coupling -----
    # Per-sample entropic-OT coupling: matches the N noise points to the N
    # corner-target points WITHIN each sample so the velocity target is
    # consistent on the permutation-invariant set. "independent" reverts to
    # random pairing (which collapses to a centroid blob -- see module docstring).
    coupling: ot
    ot_reg: 0.05                # entropic reg (relative to mean cost); lower=sharper
    ot_iters: 50                # Sinkhorn iterations

    # ----- ODE sampling (prediction: corner cloud -> vertices) -----
    ode_steps: 50               # RF paths are ~straight; 50 euler steps
    ode_method: euler           # fixed-step torchdiffeq solver
    sample_seed: 0              # fixed x0 seed -> deterministic sampling

    # ----- corner dedup (sampled cloud -> vertices) -----
    dedup_eps: 0.02             # DBSCAN eps; with dedup_relative = fraction of bbox diag
    dedup_relative: true
    dedup_min_samples: 1
    # ODE-sample + dedup at validation and log val/vpe (vertex chamfer vs GT
    # corners). Required because the checkpoint monitor is val/vpe (slower val).
    val_vpe: true

    # ----- optimization -----
    # Single-GPU base. lr ~sqrt(batch/16) from the old 1.5e-4@batch16 reference;
    # at batch 96 that is 1.5e-4 * sqrt(6) ~= 3.7e-4.
    lr: 3.7e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.95]
    warmup_steps: 500
    max_steps: 100000
    grad_clip: 1.0

trainer:
  max_epochs: 100
  check_val_every_n_epoch: 5
  accelerator: gpu
  devices: 1                    # single GPU; use configs/rf_ddp.yaml for 8x A800 DDP
  num_nodes: 1
  strategy: auto
  precision: 32-true
  # Gradient clipping is handled by the LightningModule (model.grad_clip) via
  # configure_gradient_clipping; do not also set it here (would be redundant).
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  logger:
    class_path: WandbLogger
    init_args:
      save_dir: logs
      project: pc2wireframe
      name: rf_wireframe
      log_model: false
  callbacks:
    - class_path: ModelCheckpoint
      init_args:
        filename: epoch={epoch:03d}-val_vpe={val/vpe:.4f}
        monitor: val/vpe
        verbose: false
        save_last: true
        save_top_k: 3
        mode: min
        auto_insert_metric_name: false
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: step
